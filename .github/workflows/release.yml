name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-and-release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-portal/package-lock.json

      - name: Build & test backend
        run: |
          dotnet restore Diva.slnx
          dotnet build Diva.slnx -c Release --no-restore
          dotnet test Diva.slnx --no-build -c Release

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: admin-portal
        env:
          VITE_APP_NAME: Diva AI
          VITE_APP_SLUG: diva

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}          # e.g. v1.0.0
          VERSION=${TAG#v}                # 1.0.0
          MAJOR=${VERSION%%.*}            # 1
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/diva-ai:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/diva-ai:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository_owner }}/diva-ai:latest

      - name: Package quick-start bundle
        run: |
          mkdir -p quickstart
          cp docker-compose.yml .env.example quickstart/
          zip -r quickstart-${{ steps.version.outputs.tag }}.zip quickstart/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --generate-notes \
            quickstart-${{ steps.version.outputs.tag }}.zip
