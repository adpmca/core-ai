name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: dotnet restore Diva.slnx
      - run: dotnet build Diva.slnx -c Release --no-restore
      - run: dotnet test Diva.slnx --no-build -c Release --logger "trx;LogFileName=results.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/results.trx'

  frontend:
    name: React Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-portal/package-lock.json
      - run: npm ci
        working-directory: admin-portal
      - run: npm run build
        working-directory: admin-portal
        env:
          VITE_APP_NAME: Diva AI
          VITE_APP_SLUG: diva

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
