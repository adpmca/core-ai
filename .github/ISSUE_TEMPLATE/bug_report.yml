name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Configure agent with ...
        2. Send message ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 / Ubuntu 24.04
        - .NET version: 10.x
        - Docker version: 27.x
        - Deployment: Docker Compose / bare metal
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: text
