version: "3.9"

# ── Dev stack (SQLite, no LiteLLM, no telemetry) ─────────────────────────────
services:

  diva-api:
    build: .
    ports:
      - "6032:6032"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:6032"
      Database__Provider: SQLite
      Database__SQLite__ConnectionString: "Data Source=/data/diva.db"
      # SessionTrace: persisted to the same /data volume so it survives container restarts
      ConnectionStrings__SessionTrace: "Data Source=/data/sessions-trace.db"
      LLM__UseLiteLLM: "false"
      LLM__DirectProvider__Provider: Anthropic
      LLM__DirectProvider__ApiKey: "${ANTHROPIC_API_KEY}"
      LLM__DirectProvider__Model: claude-sonnet-4-6
      AdminPortal__CorsOrigin: "${PORTAL_ORIGIN:-http://localhost:6010}"
      Verification__Mode: LlmVerifier
      Verification__ConfidenceThreshold: "0.5"
      Agent__MaxIterations: "10"
      Agent__LlmStreamIdleTimeoutSeconds: "${AGENT_LLM_STREAM_IDLE_TIMEOUT_SECONDS:-300}"
      Agent__LlmTimeoutSeconds: "${AGENT_LLM_TIMEOUT_SECONDS:-300}"
      Agent__RuleLearning__ApprovalMode: RequireAdmin
      Agent__RuleLearning__ConfidenceThreshold: "0.8"
      # Credentials vault master key — MUST be a stable base64-encoded 32-byte key.
      # If not set, an ephemeral key is generated per startup and all stored MCP
      # credentials become unrecoverable after restart.
      # Generate with: openssl rand -base64 32
      Credentials__MasterKey: "${CREDENTIALS_MASTER_KEY}"
      A2A__Enabled: "true"
      # Auth — set OAuth__Enabled=true to enforce JWT auth and enable user profile creation
      OAuth__Enabled: "${OAUTH_ENABLED:-false}"
      LocalAuth__SigningKey: "${LOCAL_AUTH_SIGNING_KEY:-change-me-in-production-must-be-32-chars!!}"
      AppBranding__ProductName: "${AppBranding__ProductName:-Diva AI}"
      AppBranding__Slug: "${AppBranding__Slug:-diva}"
      AppBranding__ApiAudience: "${AppBranding__ApiAudience:-diva-api}"
      AppBranding__LocalIssuer: "${AppBranding__LocalIssuer:-diva-local}"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6032/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  diva-portal:
    build:
      context: ./admin-portal
      args:
        VITE_APP_NAME: "${VITE_APP_NAME:-Diva AI}"
        VITE_APP_SLUG: "${VITE_APP_SLUG:-diva}"
    ports:
      - "6010:6010"
    depends_on:
      diva-api:
        condition: service_healthy
    restart: unless-stopped

# No named volumes — /data is bind-mounted to ./data on the host
